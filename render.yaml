services:
  # Backend API server
  - type: web
    name: insighttrove-interview-agent-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://insighttrove-interview-agent.onrender.com
      - key: PORT
        value: 4000

  # Frontend static site
  - type: web
    name: insighttrove-interview-agent
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://insighttrove-interview-agent-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
